services:
  php:
    build: .
    container_name: lab7_php
    volumes:
      - ./www:/var/www/html
    expose:
      - "9000"
    depends_on:
      - kafka
    networks:
      - lab7_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lab7_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - lab7_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lab7_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - lab7_network
      
  worker:
    build: .
    container_name: lab7_worker
    volumes:
      - ./www:/var/www/html
    command: php /var/www/html/worker.php
    depends_on:
      - kafka
      - php
    networks:
      - lab7_network

  nginx:
    image: nginx:alpine
    container_name: lab7_nginx
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - lab7_network

networks:
  lab7_network:
    driver: bridge